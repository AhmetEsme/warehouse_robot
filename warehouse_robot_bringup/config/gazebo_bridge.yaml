# cmd_vel — base hareketi (ROS -> Gazebo)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/warehouse_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# clock — simülasyon zamani (Gazebo -> ROS)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# joint_states (Gazebo -> ROS)
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/empty/model/warehouse_robot/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# 3 joint pozisyon komutu (ROS -> Gazebo)
- ros_topic_name: "/lower_arm_cmd"
  gz_topic_name: "/model/warehouse_robot/joint/arm_base_to_lower_arm/0/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/upper_arm_cmd"
  gz_topic_name: "/model/warehouse_robot/joint/lower_arm_to_upper_arm/0/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

- ros_topic_name: "/gripper_cmd"
  gz_topic_name: "/model/warehouse_robot/joint/upper_arm_to_gripper/0/cmd_pos"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ